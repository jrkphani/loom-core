# Loom Core — Alembic configuration
# Database URL is set dynamically from loom_core.config in env.py;
# the value below is a placeholder so `alembic current` works without env.

[alembic]
script_location = alembic
prepend_sys_path = src
sqlalchemy.url = sqlite+aiosqlite:///./loom-dev.sqlite

# Versions directory is populated by `alembic revision --autogenerate`.
version_locations = alembic/versions

# File template for new revisions.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
